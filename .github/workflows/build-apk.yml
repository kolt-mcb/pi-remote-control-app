name: Build APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # Compute the same versionCode build.gradle.kts uses: git commit count
      # plus the VERSION_CODE_OFFSET. This repo was split out of
      # grunt3714-lgtm/pi-remote-control where `latest` had reached
      # versionCode 89, so the offset (100) keeps codes strictly above that.
      # Keep this offset in sync with VERSION_CODE_OFFSET in app/build.gradle.kts.
      # The in-app updater reads versionCode from the release body to decide
      # whether the user is out of date â€” no need to download the APK to check.
      - name: Compute versionCode / versionName
        id: ver
        run: |
          # checkout@v4 does a shallow clone by default â€” need full history
          # for `git rev-list --count`.
          git fetch --unshallow || true
          CODE=$(( $(git rev-list --count HEAD) + 100 ))
          NAME=$(git rev-parse --short=8 HEAD)
          echo "versionCode=$CODE" >> "$GITHUB_OUTPUT"
          echo "versionName=$NAME" >> "$GITHUB_OUTPUT"

      - name: Rename APK with versionCode
        working-directory: app/build/outputs/apk/debug
        run: |
          mv app-debug.apk "pi-remote-v${{ steps.ver.outputs.versionCode }}.apk"

      - name: Publish to "latest" release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          # versionCode / versionName lines are parsed by the in-app updater
          # (case-sensitive). Don't reword without bumping the updater.
          body: |
            Auto-built debug APK from commit ${{ github.sha }}.
            Triggered by ${{ github.event_name }} on ${{ github.ref_name }}.

            versionCode: ${{ steps.ver.outputs.versionCode }}
            versionName: ${{ steps.ver.outputs.versionName }}
          prerelease: true
          make_latest: "false"
          files: app/build/outputs/apk/debug/pi-remote-v${{ steps.ver.outputs.versionCode }}.apk
