name: Build APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git rev-list --count HEAD` (used by build.gradle.kts
          # AT BUILD TIME to compute versionCode) returns the real commit count.
          # A shallow clone made every published APK embed versionCode 101,
          # which kept the in-app updater reporting "update available" forever.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Decode the stable release keystore (base64 GitHub secret) to a file so
      # the Gradle signingConfig can pick it up via env. A stable key is required:
      # Android only installs an update over a build signed with the SAME key.
      - name: Decode release keystore
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build release APK
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # On PRs we only need a compile/build smoke check — no signing, no publish.
      - name: Build (PR smoke check)
        if: github.event_name == 'pull_request'
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # versionCode here mirrors build.gradle.kts (commit count + offset) ONLY for
      # the artifact name / release body. With fetch-depth: 0 above, this count
      # now matches the value compiled into the APK. Keep the offset in sync with
      # VERSION_CODE_OFFSET in app/build.gradle.kts. The in-app updater reads the
      # versionCode line below (case-sensitive) to decide if the user is out of date.
      - name: Compute versionCode / versionName
        if: github.event_name != 'pull_request'
        id: ver
        run: |
          CODE=$(( $(git rev-list --count HEAD) + 100 ))
          NAME=$(git rev-parse --short=8 HEAD)
          echo "versionCode=$CODE" >> "$GITHUB_OUTPUT"
          echo "versionName=$NAME" >> "$GITHUB_OUTPUT"

      - name: Rename APK with versionCode
        if: github.event_name != 'pull_request'
        working-directory: app/build/outputs/apk/release
        run: |
          mv app-release.apk "pi-remote-v${{ steps.ver.outputs.versionCode }}.apk"

      - name: Publish to "latest" release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          # versionCode / versionName lines are parsed by the in-app updater
          # (case-sensitive). Don't reword without bumping the updater.
          body: |
            Auto-built release APK from commit ${{ github.sha }}.
            Triggered by ${{ github.event_name }} on ${{ github.ref_name }}.

            versionCode: ${{ steps.ver.outputs.versionCode }}
            versionName: ${{ steps.ver.outputs.versionName }}
          prerelease: true
          make_latest: "false"
          files: app/build/outputs/apk/release/pi-remote-v${{ steps.ver.outputs.versionCode }}.apk
